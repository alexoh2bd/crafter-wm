# ─────────────────────────────────────────────────────────────────────────────
# LeWM + PPO Teacher Config — "deep episodes" variant
#
# Goal: collect longer, richer Crafter trajectories by training the teacher
# policy long enough that it masters the survival loop:
#   find water → drink → find food → eat → sleep when tired → fight enemies
#
# Why episodes are short by default (~150–450 steps):
#   Crafter drains drink every 20 steps, food every 25 steps, energy every 30.
#   When any resource hits 0, health degenerates: −1 HP per 15 steps.
#   With 9 HP, an agent that doesn't replenish drink dies by step ~315.
#   The PPO teacher trained for 500k steps hasn't fully mastered this loop.
#   The solution is more training (2M–5M steps), NOT raising max_steps_per_episode.
# ─────────────────────────────────────────────────────────────────────────────

# ── Rollout collection strategy ───────────────────────────────────────────────
rollout_collection:
  method: teacher_ppo

  rollout_save_path: data/crafter_teacher_data_deep.pkl

  # 2000 episodes of a well-trained teacher (avg ~1000–3000 steps each) gives
  # ~2M steps of dense-achievement data — plenty for world model training.
  n_episodes: 2000

  # Crafter env default cap is 10 000 steps (length= argument to crafter.Env).
  # This soft cap only cuts off an episode if the env doesn't terminate first.
  # Set to 20 000 — well above any realistic survival length but safe from OOM.
  max_steps_per_episode: 20000

  teacher_checkpoint: data/ppo_teacher_deep.pt

  # 5 % random noise keeps trajectories diverse; reduce to 0.02 for a
  # highly-trained teacher where variety matters less.
  collection_epsilon: 0.05

  # Stochastic sampling (false) gives more diverse training data.
  # Switch to true only if the policy is very strong and you want quality over variety.
  deterministic: false

# ── PPO teacher training (teacherPPO.py) ──────────────────────────────────────
ppo:
  teacher_save_path: data/ppo_teacher_deep.pt

  # 2M steps: the policy starts learning the survival loop (drink, eat, sleep).
  # 5M steps: consistent mid-to-late game coverage (iron tools, combat).
  # Increase to 5M if you want episodes regularly exceeding 1000 steps.
  ppo_total_steps: 2000000

  # 16 envs lets the policy see night/day cycles, diverse biomes, and enemy
  # encounters simultaneously. Requires ~16 CPU cores on the node.
  n_envs: 16

  rollout_len: 128

  ppo_epochs: 4
  minibatches: 4

  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  ppo_lr: 2.5e-4
  ent_coef: 0.01       # keep entropy bonus; survival requires sustained exploration

# ── Dataset / sequencing (CrafterDataset) ─────────────────────────────────────
dataset:
  context_len: 16
  img_size: 64

# ── LeWM model architecture ───────────────────────────────────────────────────
model:
  latent_dim: 256
  patch_size: 8
  encoder_depth: 12
  encoder_heads: 3
  predictor_depth: 6
  predictor_heads: 16
  sigreg_M: 1024
  sigreg_lambda: 0.1
  dropout: 0.1

# ── LeWM training (letrain.py) ────────────────────────────────────────────────
training:
  epochs: 100
  batch_size: 128
  lr: 3.0e-4
  weight_decay: 1.0e-4
  warmup_steps: 1000
  total_steps: 200000
  log_every: 50
  seed: 0

# ── Infrastructure ────────────────────────────────────────────────────────────
infra:
  logdir: logs/lewm_teacher_deep

# ── Weights & Biases ──────────────────────────────────────────────────────────
wandb:
  use_wandb: true
  wandb_project: lewm-crafter
  wandb_run_name: ppo-teacher-deep
